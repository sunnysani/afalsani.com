<html>
    <body>
        <style>
            body {
                text-align: center;
            }

            .avatar-bg::before {
                content: '';
                position: absolute;
                left: 0;
                right: 100%;
                bottom: 0;
                top: 0;
                transition: 0.5s 0.5s;
                transition-timing-function: cubic-bezier(.85,0,.15,1);
                background-color: #e99e87;
            }
            .main:hover .avatar-bg::before {
                right:0;
                transition: 0.5s;
            }
            .avatar {
                background-color: rebeccapurple;
            }
            .avatar {
                transform: translateX(-100%);
                transition: transform 0.5s;
                transition-timing-function: cubic-bezier(.85,0,.15,1);
                overflow: hidden;
            }
            h1, p {
                transform: translateX(100%);
                transition: transform 0.5s;
                transition-timing-function: cubic-bezier(.85,0,.15,1);
            }
            .main:hover .avatar, .main:hover .avatar h1, .main:hover .avatar p {
                transform: translateX(0);
                transition: transform 0.5s 0.5s;
                transition-timing-function: cubic-bezier(.85,0,.15,1);
            }
        </style>
        <div class="main">
            <div class="avatar-bg">
                <div class="avatar">
                    <h1>Test H1</h1>
                    <p>Test P</p>
                </div>
            </div>
        </div>
    </body>
</html>
